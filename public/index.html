<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资产增值统计</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="月份筛选">
        <div>
          <p class="eyebrow">本地 SQLite 资产台账</p>
          <h1>资产增值统计</h1>
        </div>
        <label class="month-picker">
          <span>统计月份</span>
          <input id="monthFilter" type="month" />
        </label>
      </section>

      <section class="metrics" aria-label="资产汇总">
        <article class="metric">
          <span>当月总资产</span>
          <strong id="totalValue">--</strong>
        </article>
        <article class="metric">
          <span>前期对比值</span>
          <strong id="previousValue">--</strong>
        </article>
        <article class="metric">
          <span>增值金额</span>
          <strong id="changeValue">--</strong>
        </article>
        <article class="metric">
          <span>增值率</span>
          <strong id="changeRate">--</strong>
        </article>
      </section>

      <section class="workspace">
        <form id="assetTypeForm" class="panel">
          <div class="panel-heading">
            <h2>资产类型</h2>
          </div>
          <label>
            <span>名称</span>
            <input id="assetTypeName" autocomplete="off" required placeholder="现金 / 股票 / 房产" />
          </label>
          <label>
            <span>备注</span>
            <input id="assetTypeDescription" autocomplete="off" placeholder="可选" />
          </label>
          <button type="submit">添加类型</button>
        </form>

        <form id="recordForm" class="panel">
          <div class="panel-heading">
            <h2>记录月度价值</h2>
          </div>
          <label>
            <span>资产类型</span>
            <select id="recordAssetType" required></select>
          </label>
          <label>
            <span>月份</span>
            <input id="recordMonth" type="month" required />
          </label>
          <label>
            <span>价值</span>
            <input id="recordValue" type="number" min="0" step="0.01" required placeholder="0.00" />
          </label>
          <label>
            <span>备注</span>
            <input id="recordNote" autocomplete="off" placeholder="可选" />
          </label>
          <button type="submit">保存记录</button>
        </form>
      </section>

      <section class="results" aria-label="资产明细">
        <div class="panel-heading">
          <h2>月度明细</h2>
          <p id="statusMessage" role="status"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>资产类型</th>
                <th>月份</th>
                <th>当月价值</th>
                <th>对比月份</th>
                <th>增值金额</th>
                <th>增值率</th>
              </tr>
            </thead>
            <tbody id="summaryRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
